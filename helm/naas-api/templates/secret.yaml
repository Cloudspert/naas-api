apiVersion: v1
kind: Secret
metadata:
  name: {{ include "naas-api.fullname" . }}-auth
  labels:
    {{- include "naas-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Consumed as a JSON map {"user":"password", ...} by the basic-auth module.
  APP_BASIC_AUTH_USERS: {{ .Values.auth.basicUsers | toJson | quote }}
