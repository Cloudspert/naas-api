{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "naas-api.fullname" . }}
  labels:
    {{- include "naas-api.labels" . | nindent 4 }}
rules:
  # Namespace lifecycle.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  # Quota management.
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "create", "patch", "update", "delete"]
  # EgressIP management (OVN-Kubernetes, cluster-scoped).
  - apiGroups: ["k8s.ovn.org"]
    resources: ["egressips"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
{{- if .Values.rbac.allowWildcardForceDelete }}
  # Force-delete needs to enumerate and remove every resource type (incl. CRDs).
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "delete"]
  # Discovery of CRD-backed API resources.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
{{- else }}
  # Restricted force-delete: core namespaced resources only.
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims", "serviceaccounts"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "delete"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "naas-api.fullname" . }}
  labels:
    {{- include "naas-api.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "naas-api.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "naas-api.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
